openapi: 3.0.0
info:
  title: FakeStore API (upstream)
  version: "1.0.0"
  description: >
    Unofficial, hand-maintained spec covering only the endpoints
    fakestore-gateway-node actually calls on https://fakestoreapi.com.
    Not published or maintained by FakeStore itself - update manually if
    the gateway's usage of this API changes.

servers:
  - url: https://fakestoreapi.com

paths:
  /products:
    get:
      summary: Get all products
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Created product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        price:
          type: number
        description:
          type: string
        category:
          type: string
        image:
          type: string
    ProductInput:
      type: object
      required:
        - title
        - price
        - description
        - image
        - category
      properties:
        title:
          type: string
        price:
          type: number
        description:
          type: string
        image:
          type: string
        category:
          type: string
