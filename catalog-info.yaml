apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fakestore-gateway-node-github
  title: FakeStore Gateway on GitHub Actions (NodeJS)
  description: >
    Lightweight NodeJS gateway that authenticates users via JWT and proxies
    requests to the FakeStore API. GitHub workflow.
  annotations:
    github.com/project-slug: qand90/fakestore-gateway-node
    backstage.io/techdocs-ref: dir:.
  tags:
    - github
    - nodejs
    - express
    - gateway
    - rest-api
    - docker
    - performance-testing

spec:
  type: service
  lifecycle: experimental
  owner: user:sasha
  system: fakestore-platform

  providesApis:
    - fakestore-gateway-api

  consumesApis:
    - fakestore-api-upstream

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: fakestore-gateway-api
  title: FakeStore Gateway API
  description: >
    REST API exposed by the fakestore-gateway-node service - auth plus
    proxied product endpoints.
spec:
  type: openapi
  lifecycle: experimental
  owner: user:sasha
  system: fakestore-platform
  definition:
    $text: ./swagger.yaml

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: fakestore-api-upstream
  title: FakeStore API (upstream, third-party)
  description: >
    Public third-party product-catalog API (fakestoreapi.com) that this
    gateway proxies to. No official OpenAPI spec is published upstream, so
    this is modeled as a Resource dependency rather than a catalog API entity.
  links:
    - url: https://fakestoreapi.com
      title: FakeStore API docs
spec:
  type: third-party-api
  owner: external
  system: fakestore-platform
